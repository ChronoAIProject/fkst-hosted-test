kind = "package.composed"
name = "github-devloop"
persistence_class = "saga"

[code]
root = "."

[lib_deps]
libraries = ["contract", "workflow", "testkit", "forge", "devloop"]

[event_deps]
packages = ["github-proxy", "consensus", "github-devloop-decompose"]

[conformance]
pack = "conformance/pack.toml"
function = "core.span_conformance_errors"
